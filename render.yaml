# Render Blueprint — deploys the SRMS Spring Boot app as a Docker web service.
# In the Render dashboard: New + -> Blueprint, point it at this repo.
#
# This is configured for the FREE plan (no credit card required).
#
# Trade-off: the free plan has no persistent disk, so the SQLite database lives
# on the container's ephemeral disk. It is re-seeded with demo data whenever the
# service restarts or redeploys (and free services sleep after inactivity).
# That's fine for a demo/portfolio. To keep data permanently, upgrade to a paid
# plan and add a disk — see DEPLOYMENT.md.
services:
  - type: web
    name: srms
    runtime: docker
    plan: free
    healthCheckPath: /
