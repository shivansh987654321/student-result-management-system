# ============================================================
# SRMS backend configuration
# ============================================================

# Server port (Render/Railway inject PORT; default 8080 locally)
server.port=${PORT:8080}

# --- SQLite datasource ---
# SRMS_DB_PATH lets you point at a persistent disk in production
# (e.g. /var/data/srms.db on a Render persistent disk).
spring.datasource.url=jdbc:sqlite:${SRMS_DB_PATH:srms.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Static front-end is served from classpath:/static
spring.web.resources.static-locations=classpath:/static/

# Include the reason in API error responses so the front-end can show it
server.error.include-message=always
